<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VZeta Corp - App Web</title>
    <style>

            background-color: #1a1a2e;
            color: #eee;

            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        p { color: #a8a8b3; }
        .badge {
            background-color: #0f3460;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>VZeta Corp</h1>
        <p>Aplicación web desplegada con Docker + NGINX</p>
        <p>Despliegue continuo con GitHub Actions</p>
        <div class="badge">✅ Contenedor activo</div>
    </div>

</html>
