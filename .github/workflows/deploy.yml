name: CI/CD Pipeline — VZeta Docker NGINX

on:
  push:
    branches:
      - main
      - master
jobs:
  build-and-push:
    name: Build y Push imagen a Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Login en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vzeta-nginx:latest

  deploy:
    name: Desplegar en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Despliegue SSH en instancia EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop vzeta-nginx || true
            docker rm vzeta-nginx || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vzeta-nginx:latest
            docker run -d \
              --name vzeta-nginx \
              --restart unless-stopped \
              -p 80:80 \
              -v /home/ubuntu/vzeta-app:/usr/share/nginx/html \
              ${{ secrets.DOCKERHUB_USERNAME }}/vzeta-nginx:latest
            docker ps | grep vzeta-nginx