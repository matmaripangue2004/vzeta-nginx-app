name: CI/CD Pipeline — VZeta Docker NGINX

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push imagen a Docker Hub
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar imagen Docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vzeta-nginx:latest

  deploy:
    name: Desplegar en EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Despliegue SSH en instancia EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Detener y eliminar contenedor anterior si existe
            docker stop vzeta-nginx || true
            docker rm vzeta-nginx || true

            # Descargar la imagen más reciente
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/vzeta-nginx:latest

            # Iniciar el nuevo contenedor con Bind Mount
            docker run -d \
              --name vzeta-nginx \
              --restart unless-stopped \
              -p 80:80 \
              -v /home/ubuntu/vzeta-app:/usr/share/nginx/html \
              ${{ secrets.DOCKERHUB_USERNAME }}/vzeta-nginx:latest

            # Verificar que está corriendo
            docker ps | grep vzeta-nginx